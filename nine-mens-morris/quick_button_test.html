<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>按钮修复快速测试</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
        }
        
        .test-title {
            text-align: center;
            color: #00f5ff;
            margin-bottom: 30px;
        }
        
        .test-container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        .screen-test {
            width: 100%;
            height: 400px;
            border: 2px solid #00f5ff;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            background: #0a0a0f;
            margin-bottom: 20px;
        }
        
        .test-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #00f5ff;
        }
        
        .info-item {
            margin: 5px 0;
        }
        
        .pass {
            color: #00ff88;
        }
        
        .fail {
            color: #ff3366;
        }
        
        .size-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
            justify-content: center;
        }
        
        .size-btn {
            padding: 8px 15px;
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 5px;
            color: #00f5ff;
            cursor: pointer;
        }
        
        .size-btn:hover {
            background: rgba(0, 245, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1 class="test-title">游戏控制按钮修复测试</h1>
        
        <div class="size-controls">
            <button class="size-btn" onclick="setScreenSize(320)">320px (iPhone 5)</button>
            <button class="size-btn" onclick="setScreenSize(375)">375px (iPhone SE)</button>
            <button class="size-btn" onclick="setScreenSize(414)">414px (iPhone 11)</button>
            <button class="size-btn" onclick="setScreenSize(480)">480px</button>
            <button class="size-btn" onclick="setScreenSize(768)">768px</button>
            <button class="size-btn" onclick="resetScreenSize()">实际尺寸</button>
        </div>
        
        <div class="screen-test" id="screen-test">
            <!-- 使用实际的游戏控制按钮 -->
            <div class="game-controls">
                <button class="control-btn">
                    <span class="btn-icon">✦</span>
                    <span class="btn-text">新游戏</span>
                </button>
                <button class="control-btn">
                    <span class="btn-icon">🎨</span>
                    <span class="btn-text">风格</span>
                </button>
                <button class="control-btn">
                    <span class="btn-icon">↶</span>
                    <span class="btn-text">悔棋</span>
                </button>
            </div>
        </div>
        
        <div class="test-info">
            <div class="info-item">当前测试宽度: <span id="current-width">--</span>px</div>
            <div class="info-item">按钮布局状态: <span id="layout-state">等待测试...</span></div>
            <div class="info-item">CSS媒体查询: <span id="media-query">--</span></div>
            <div class="info-item">建议操作: <span id="suggestion">--</span></div>
        </div>
    </div>

    <script>
        const screenTest = document.getElementById('screen-test');
        const gameControls = document.querySelector('.game-controls');
        const controlBtns = document.querySelectorAll('.control-btn');
        
        function setScreenSize(width) {
            screenTest.style.width = width + 'px';
            updateTestInfo();
        }
        
        function resetScreenSize() {
            screenTest.style.width = '100%';
            updateTestInfo();
        }
        
        function updateTestInfo() {
            const width = screenTest.offsetWidth;
            document.getElementById('current-width').textContent = width;
            
            // 检查按钮是否换行
            const controlsRect = gameControls.getBoundingClientRect();
            let allInOneLine = true;
            
            controlBtns.forEach((btn, index) => {
                const btnRect = btn.getBoundingClientRect();
                // 如果按钮的顶部位置不同，说明换行了
                if (index > 0) {
                    const prevBtnRect = controlBtns[index - 1].getBoundingClientRect();
                    if (Math.abs(btnRect.top - prevBtnRect.top) > 5) {
                        allInOneLine = false;
                    }
                }
            });
            
            // 确定当前应用的媒体查询
            let mediaQuery = '基础样式';
            if (width <= 320) {
                mediaQuery = '@media (max-width: 320px)';
            } else if (width <= 375) {
                mediaQuery = '@media (max-width: 375px)';
            } else if (width <= 480) {
                mediaQuery = '@media (max-width: 480px)';
            } else if (width <= 768) {
                mediaQuery = '@media (max-width: 768px)';
            }
            
            document.getElementById('media-query').textContent = mediaQuery;
            
            if (allInOneLine) {
                document.getElementById('layout-state').innerHTML = '<span class="pass">✓ 按钮保持在一行</span>';
                document.getElementById('suggestion').textContent = '布局正常，无需调整';
            } else {
                document.getElementById('layout-state').innerHTML = '<span class="fail">✗ 按钮换行</span>';
                document.getElementById('suggestion').textContent = '需要进一步优化CSS';
            }
            
            // 输出详细尺寸信息
            console.log('=== 按钮布局分析 ===');
            console.log(`屏幕宽度: ${width}px`);
            console.log(`控制区域宽度: ${controlsRect.width}px`);
            
            controlBtns.forEach((btn, index) => {
                const btnRect = btn.getBoundingClientRect();
                const style = window.getComputedStyle(btn);
                console.log(`按钮${index + 1}: 宽度=${btnRect.width}px, 高度=${btnRect.height}px, padding=${style.padding}, font-size=${style.fontSize}`);
            });
        }
        
        // 初始测试
        window.onload = function() {
            resetScreenSize();
            
            // 监听窗口大小变化
            window.addEventListener('resize', function() {
                setTimeout(updateTestInfo, 100);
            });
        };
    </script>
</body>
</html>
